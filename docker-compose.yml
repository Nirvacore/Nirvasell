# nirva.sell — single-host production compose
#
# Defaults assume a small VPS (1-2 GB RAM). For multi-host or large traffic,
# put nginx + a load balancer in front and scale `app` horizontally.
#
# Quick start:
#   cp .env.example .env       # fill in values
#   docker compose up -d       # build + run in background
#   docker compose logs -f     # tail logs
#   docker compose down        # stop (data persists in ./data)

services:

  app:
    build: .
    image: nirva-sell:latest
    container_name: nirva-sell
    restart: unless-stopped
    ports:
      # Expose only on localhost — reverse-proxy with nginx in production
      - "127.0.0.1:8501:8501"
    env_file:
      - .env
    volumes:
      # Persistent state: per-user DBs + scraped images + generated artifacts
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    # Tighten OS limits — Streamlit + Claude SDK don't need many threads
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
    # Avoid runaway memory (rembg in particular can be hungry)
    deploy:
      resources:
        limits:
          memory: 1500M
        reservations:
          memory: 400M

